<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#111827">
    <title>Streamify Piped Engine</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #0b0f19; --card: #111827; --accent: #ef4444; --text: #ffffff; --text-muted: #9ca3af; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .card { background: var(--card); border: 1px solid #1f2937; border-radius: 24px; width: 100%; max-width: 400px; padding: 28px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); text-align: center; }
        .header { font-size: 20px; font-weight: 800; margin-bottom: 24px; letter-spacing: -0.5px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .header span { color: var(--accent); }
        input { width: 100%; background: #1f2937; color: #fff; border: 1px solid #374151; border-radius: 14px; padding: 16px; font-size: 15px; outline: none; margin-bottom: 16px; transition: border 0.2s; }
        input:focus { border-color: var(--accent); }
        button { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 14px; padding: 16px; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
        button:active { opacity: 0.8; }
        .terminal { margin-top: 20px; background: #070a12; color: #34d399; font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 14px; border-radius: 12px; text-align: left; min-height: 50px; word-break: break-all; }
        .terminal.err { color: #f87171; }
        .player-zone { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #1f2937; }
        .title { font-size: 15px; font-weight: 700; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .author { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
        audio { width: 100%; height: 40px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">Streamify <span>Audio</span></div>
        <input type="text" id="url" placeholder="Paste YouTube link or ID...">
        <button id="play-btn">Initialize Engine</button>
        <div class="terminal" id="term">> System ready. Standing by.</div>
        
        <div class="player-zone" id="player-zone">
            <div class="title" id="track-title">Track Title</div>
            <div class="author" id="track-author">Channel</div>
            <audio id="audio-node" controls playsinline></audio>
        </div>
    </div>

    <script>
        // Physical Service worker scope validation for secure roots
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        }

        // Piped active mirror matrix clusters
        const PIPED_NODES = [
            "https://pipedapi.kavin.rocks",
            "https://pipedapi.tokhmi.xyz",
            "https://api.piped.yt",
            "https://pipedapi.colby.moe",
            "https://piped-api.garudalinux.org",
            "https://pipedapi.leptons.xyz"
        ];

        const ui = {
            url: document.getElementById('url'),
            btn: document.getElementById('play-btn'),
            term: document.getElementById('term'),
            zone: document.getElementById('player-zone'),
            title: document.getElementById('track-title'),
            author: document.getElementById('track-author'),
            audio: document.getElementById('audio-node')
        };

        function parseId(input) {
            let val = input.trim();
            if (val.length === 11) return val;
            let reg = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/|youtube\.com\/shorts\/)([^"&?\/\s]{11})/i;
            let match = val.match(reg);
            return match ? match[1] : null;
        }

        async function fetchStream(id) {
            for (let i = 0; i < PIPED_NODES.length; i++) {
                ui.term.className = 'terminal';
                ui.term.textContent = `> Routing pipeline node [${i+1}/${PIPED_NODES.length}]...`;
                try {
                    let res = await fetch(`${PIPED_NODES[i]}/streams/${id}`);
                    if (!res.ok) throw new Error();
                    let data = await res.json();
                    
                    // Filter out high-quality decoupled audio tracks
                    if (data.audioStreams && data.audioStreams.length > 0) {
                        return {
                            url: data.audioStreams[0].url,
                            title: data.title,
                            author: data.uploader
                        };
                    }
                } catch (e) {
                    console.log(`Node ${PIPED_NODES[i]} rejected response pipeline.`);
                }
            }
            throw new Error("CLUSTER_EXHAUSTION: All public nodes rejected the audio streams.");
        }

        function setupMediaSession(title, author) {
            if (!('mediaSession' in navigator)) return;
            navigator.mediaSession.metadata = new MediaMetadata({
                title: title,
                artist: author,
                artwork: [{ src: 'https://via.placeholder.com/512x512.png?text=Audio', sizes: '512x512', type: 'image/png' }]
            });
            navigator.mediaSession.setActionHandler('play', () => ui.audio.play());
            navigator.mediaSession.setActionHandler('pause', () => ui.audio.pause());
        }

        ui.btn.addEventListener('click', async () => {
            let id = parseId(ui.url.value);
            if (!id) {
                ui.term.className = 'terminal err';
                ui.term.textContent = "> ERROR: Invalid YouTube String structure.";
                return;
            }

            ui.btn.disabled = true;
            try {
                let track = await fetchStream(id);
                
                ui.audio.src = track.url;
                ui.audio.load();
                await ui.audio.play();
                
                setupMediaSession(track.title, track.author);
                
                ui.title.textContent = track.title;
                ui.author.textContent = track.author;
                ui.zone.style.display = 'block';
                ui.term.textContent = "> STATUS: Stream integrated successfully.";
            } catch (err) {
                ui.term.className = 'terminal err';
                ui.term.textContent = `> ${err.message}`;
            } finally {
                ui.btn.disabled = false;
            }
        });
    </script>
</body>
</html>
