<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d0e15">
    <title>Streamify Background Deck</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #06070d;
            --surface-color: #0d0e16;
            --border-color: #1f2235;
            --accent-color: #ff3e3e;
            --text-main: #ffffff;
            --text-muted: #7e84a3;
            --terminal-green: #34d399;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
        
        .player-frame {
            background: var(--surface-color);
            border: 2px solid var(--border-color);
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .brand { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 24px; display: flex; align-items: center; gap: 8px; }
        .brand span { color: var(--accent-color); }

        .input-group { margin-bottom: 16px; }
        input {
            width: 100%;
            background: #131522;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            padding: 16px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent-color); }

        button {
            width: 100%;
            background: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:active { transform: scale(0.98); opacity: 0.9; }
        button:disabled { background: #222538; color: var(--text-muted); cursor: not-allowed; }

        .console-log {
            margin-top: 16px;
            background: #030408;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--terminal-green);
            min-height: 54px;
            word-break: break-all;
        }
        .console-log.error-state { color: #f87171; border-color: #551a1a; }

        .deck-display { display: none; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border-color); }
        .track-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .track-author { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
        
        audio { width: 100%; height: 40px; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="player-frame">
        <div class="brand">CORE<span>DECK</span></div>
        
        <div class="input-group">
            <input type="text" id="target-url" placeholder="Paste YouTube link or Video ID...">
        </div>
        
        <button id="ignite-btn">Load Pipeline</button>
        
        <div class="console-log" id="terminal-screen">> System status: Nominal. Ready for stream hook.</div>
        
        <div class="deck-display" id="player-view">
            <div class="track-title" id="meta-title">Asset Title</div>
            <div class="track-author" id="meta-author">Channel Title</div>
            <audio id="core-audio-node" controls playsinline></audio>
        </div>
    </div>

    <script>
        // Inline PWA worker structure injection to allow background network processes
        const swTemplate = `
            self.addEventListener('install', e => self.skipWaiting());
            self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
            self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
        `;
        const blobInstance = new Blob([swTemplate], { type: 'application/javascript' });
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(URL.createObjectURL(blobInstance)).catch(()=>{});
        }

        // Dedicated Piped Federation Endpoint Clusters (Proxied by design)
        const FEDERATION_ROUTERS = [
            "https://pipedapi.kavin.rocks",
            "https://pipedapi.tokhmi.xyz",
            "https://api.piped.yt",
            "https://pipedapi.colby.moe",
            "https://piped-api.garudalinux.org",
            "https://pipedapi.leptons.xyz"
        ];

        const dom = {
            input: document.getElementById('target-url'),
            btn: document.getElementById('ignite-btn'),
            term: document.getElementById('terminal-screen'),
            view: document.getElementById('player-view'),
            title: document.getElementById('meta-title'),
            author: document.getElementById('meta-author'),
            audio: document.getElementById('core-audio-node')
        };

        let audioContextEngine = null;

        // Triggers an un-stoppable mathematical silent frequency to keep the mobile processor awake
        function executeWakeLockHack() {
            try {
                if (audioContextEngine) return;
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioContextClass) return;
                
                audioContextEngine = new AudioContextClass();
                const oscillator = audioContextEngine.createOscillator();
                const gainNode = audioContextEngine.createGain();
                
                oscillator.type = 'sine';
                oscillator.frequency.value = 20000; // Ultra-sonic frequency outside human hearing spectrum
                gainNode.gain.value = 0.00001;     // Infinite near-zero amplitude prevents sound clipping
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContextEngine.destination);
                oscillator.start(0);
                logTerminal("WAKE_LOCK: Background CPU lock sequence injected.");
            } catch(e) {
                console.log("WakeLock structure rejected initialization context.", e);
            }
        }

        function logTerminal(msg, isError = false) {
            dom.term.textContent = `> ${msg}`;
            dom.term.className = isError ? 'console-log error-state' : 'console-log';
        }

        function extractCleanId(raw) {
            let src = raw.trim();
            if (src.length === 11) return src;
            let pattern = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/|youtube\.com\/shorts\/)([^"&?\/\s]{11})/i;
            let extraction = src.match(pattern);
            return extraction ? extraction[1] : null;
        }

        async function extractProxiedPayload(videoId) {
            for(let i = 0; i < FEDERATION_ROUTERS.length; i++) {
                logTerminal(`Routing matrix node cluster [${i+1}/${FEDERATION_ROUTERS.length}]...`);
                try {
                    const timeoutSignal = AbortController.timeout ? AbortController.timeout(6000) : null;
                    const response = await fetch(`${FEDERATION_ROUTERS[i]}/streams/${videoId}`, { signal: timeoutSignal });
                    if(!response.ok) throw new Error();
                    
                    const payload = await response.json();
                    if(payload.audioStreams && payload.audioStreams.length > 0) {
                        // Sort by quality index to grab highest fidelity clean data channel
                        payload.audioStreams.sort((a,b) => (b.bitrate || 0) - (a.bitrate || 0));
                        return {
                            url: payload.audioStreams[0].url,
                            title: payload.title,
                            author: payload.uploader
                        };
                    }
                } catch(err) {
                    console.warn(`Cluster Node index ${i} failed stream delivery constraints.`);
                }
            }
            throw new Error("FAILOVER_CRITICAL: All proxied federation endpoints rejected operational requests.");
        }

        function configureSystemMediaSession(title, author) {
            if (!('mediaSession' in navigator)) return;
            navigator.mediaSession.metadata = new MediaMetadata({
                title: title,
                artist: author,
                artwork: [{ src: 'https://images.unsplash.com/photo-1614680376593-902f74fa0d41?w=512', sizes: '512x512', type: 'image/jpeg' }]
            });
            navigator.mediaSession.setActionHandler('play', () => dom.audio.play());
            navigator.mediaSession.setActionHandler('pause', () => dom.audio.pause());
        }

        dom.btn.addEventListener('click', async () => {
            const parsedId = extractCleanId(dom.input.value);
            if(!parsedId) {
                logTerminal("PARSING_ERROR: Input is missing standard 11-character YouTube configuration formatting.", true);
                return;
            }

            dom.btn.disabled = true;
            executeWakeLockHack();

            try {
                const trackData = await extractProxiedPayload(parsedId);
                
                dom.audio.src = trackData.url;
                dom.audio.load();
                await dom.audio.play();
                
                configureSystemMediaSession(trackData.title, trackData.author);
                
                dom.title.textContent = trackData.title;
                dom.author.textContent = trackData.author;
                dom.view.style.display = 'block';
                logTerminal("PIPELINE_STABLE: Stream connected through absolute data proxy.");
            } catch(err) {
                logTerminal(err.message, true);
            } finally {
                dom.btn.disabled = false;
            }
        });

        dom.audio.addEventListener('error', () => {
            logTerminal("PIPELINE_BREAK: Audio source channel was closed prematurely by host node.", true);
        });
    </script>
</body>
</html>
